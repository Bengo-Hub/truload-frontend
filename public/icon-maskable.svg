<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6b2460"/>
      <stop offset="100%" style="stop-color:#5B1C4D"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f09030"/>
      <stop offset="100%" style="stop-color:#ea8022"/>
    </linearGradient>
  </defs>
  <!-- Maskable safe-area background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Truck silhouette -->
  <g transform="translate(96, 100)" fill="#ffffff">
    <!-- Cargo container -->
    <rect x="0" y="24" width="196" height="84" rx="6"/>
    <!-- Cab -->
    <path d="M196 24 L196 108 L280 108 L280 56 L236 24 Z"/>
    <!-- Cab window -->
    <path d="M206 34 L230 34 L268 64 L268 98 L206 98 Z" fill="url(#bg)" opacity="0.45"/>
    <!-- Load lines on cargo -->
    <rect x="24" y="42" width="4" height="50" rx="2" fill="url(#bg)" opacity="0.12"/>
    <rect x="56" y="42" width="4" height="50" rx="2" fill="url(#bg)" opacity="0.12"/>
    <rect x="88" y="42" width="4" height="50" rx="2" fill="url(#bg)" opacity="0.12"/>
    <rect x="120" y="42" width="4" height="50" rx="2" fill="url(#bg)" opacity="0.12"/>
    <rect x="152" y="42" width="4" height="50" rx="2" fill="url(#bg)" opacity="0.12"/>
  </g>
  <!-- Wheels -->
  <circle cx="158" cy="230" r="22" fill="#ffffff"/>
  <circle cx="158" cy="230" r="11" fill="url(#bg)"/>
  <circle cx="246" cy="230" r="22" fill="#ffffff"/>
  <circle cx="246" cy="230" r="11" fill="url(#bg)"/>
  <circle cx="356" cy="230" r="22" fill="#ffffff"/>
  <circle cx="356" cy="230" r="11" fill="url(#bg)"/>
  <!-- Weighing scale platform -->
  <rect x="84" y="264" width="344" height="12" rx="6" fill="#ffffff" opacity="0.9"/>
  <!-- Scale pillar -->
  <rect x="240" y="276" width="32" height="36" rx="4" fill="#ffffff" opacity="0.55"/>
  <!-- Scale base -->
  <rect x="200" y="312" width="112" height="10" rx="5" fill="#ffffff" opacity="0.7"/>
  <!-- CodeVertex V checkmark badge (orange accent) -->
  <g transform="translate(354, 108)">
    <circle cx="38" cy="38" r="38" fill="#ffffff"/>
    <circle cx="38" cy="38" r="32" fill="url(#accent)"/>
    <!-- V shape inspired by CodeVertex logo checkmark -->
    <path d="M22 28 L38 50 L54 28" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- TruLoad text -->
  <g transform="translate(108, 350)" fill="#ffffff" opacity="0.95">
    <text font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="bold" letter-spacing="6">
      <tspan>Tru</tspan><tspan fill="url(#accent)">Load</tspan>
    </text>
  </g>
  <!-- Tagline -->
  <text x="256" y="430" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#ffffff" opacity="0.6" letter-spacing="4">
    WEIGHING SOLUTIONS
  </text>
</svg>
