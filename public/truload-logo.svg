<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 60" width="260" height="60">
  <defs>
    <linearGradient id="cv-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6b2460"/>
      <stop offset="100%" style="stop-color:#5B1C4D"/>
    </linearGradient>
    <linearGradient id="cv-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f09030"/>
      <stop offset="100%" style="stop-color:#ea8022"/>
    </linearGradient>
  </defs>
  <!-- Icon mark: truck + CodeVertex V badge -->
  <g transform="translate(2, 6)">
    <!-- Truck body -->
    <rect x="0" y="10" width="30" height="19" rx="2.5" fill="url(#cv-grad)"/>
    <!-- Truck cab -->
    <path d="M30 10 L30 29 L42 29 L42 18 L36 10 Z" fill="url(#cv-grad)"/>
    <!-- Wheels -->
    <circle cx="10" cy="31" r="4.5" fill="url(#cv-grad)"/>
    <circle cx="36" cy="31" r="4.5" fill="url(#cv-grad)"/>
    <!-- Scale platform -->
    <rect x="0" y="38" width="42" height="3" rx="1.5" fill="url(#cv-grad)" opacity="0.5"/>
    <!-- CodeVertex V badge (orange circle with V) -->
    <circle cx="38" cy="9" r="9" fill="url(#cv-accent)"/>
    <path d="M32 6 L38 14 L44 6" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- TruLoad text -->
  <text x="54" y="38" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="bold">
    <tspan fill="url(#cv-grad)">Tru</tspan><tspan fill="url(#cv-accent)">Load</tspan>
  </text>
</svg>
